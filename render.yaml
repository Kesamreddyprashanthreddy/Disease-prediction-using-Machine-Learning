services:
  - type: web
    name: ai-medical-diagnosis
    env: python
    runtime: python-3.10.0
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: STREAMLIT_SERVER_HEADLESS
        value: true
      - key: STREAMLIT_SERVER_PORT
        value: 10000
